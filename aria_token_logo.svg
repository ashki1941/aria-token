<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="#3B0764"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#F59E0B" stroke-width="4"/>
  
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="10" r="4" fill="#F59E0B"/>
  <circle cx="100" cy="190" r="4" fill="#F59E0B"/>
  <circle cx="10" cy="100" r="4" fill="#F59E0B"/>
  <circle cx="190" cy="100" r="4" fill="#F59E0B"/>
  
  <!-- Inner background -->
  <circle cx="100" cy="100" r="70" fill="#4C1D95"/>
  
  <!-- Letter A -->
  <polygon points="100,30 68,140 85,140 100,95 115,140 132,140" fill="#F59E0B"/>
  <!-- Crossbar cutout -->
  <rect x="81" y="105" width="38" height="12" fill="#4C1D95"/>
  
  <!-- ARIA text -->
  <text x="100" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F59E0B" letter-spacing="4">ARIA</text>
</svg>
